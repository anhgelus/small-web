when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: microvm
image: alpine

steps:
  - name: "Install deps"
    command: apk add go git deno curl just openssh rsync
  - name: "Building"
    command: |
      deno i
      just build
  - name: "Install secrets"
    command: |
      mkdir ~/.ssh/
      echo "$DEPLOY_PRIVATE_KEY" > ~/.ssh/key
      cat <<EOF > ~/.ssh/config
      Host server
        HostName $DEPLOY_SERVER
        User $DEPLOY_USER
        IdentityFile ~/.ssh/key
        PreferredAuthentications publickey
      EOF
      ssh-keyscan "$DEPLOY_SERVER" > ~/.ssh/known_hosts
  - name: "Deploy"
    command: |
      rsync -riz ./small-web server:small-web
      ssh server \
        "doas install -m 755 small-web /usr/local/bin && doas rc-service small-web restart"
