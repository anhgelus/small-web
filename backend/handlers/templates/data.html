{{ define "body" }}
  <article id="content">
		{{ $art := .Custom }}
    <h1>{{ $art.Title }}</h1>
    <p>{{ $art.Description }}</p>
    <figure>
      <img src="{{ static $art.Image.Src }}" alt="{{ $art.Image.Alt }}" class="large" />
      <figcaption>{{ $art.Image.Legend }}</figcaption>
    </figure>
    {{ $art.Content }}
  </article>
{{ end }}
