{{ define "body" }}
  <article id="content">
    <h1>{{ .Title }}</h1>
    <p>{{ .Description }}</p>
    <figure>
      <img src="{{ static .Image.Src }}" alt="{{ .Image.Alt }}" class="large" />
      <figcaption>{{ .Image.Legend }}</figcaption>
    </figure>
    {{ .Content }}
  </article>
{{ end }}
